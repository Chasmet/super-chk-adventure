<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Super Chk Adventure</title>
  <link rel="stylesheet" href="styles.css?v=3" />
</head>
<body>
  <div class="app">
    <section class="game-screen">
      <div class="hud">
        <div class="hud-left">
          <span id="levelLabel">Niveau 1</span>
          <span id="difficultyLabel">Facile</span>
        </div>
        <div class="hud-right">
          <span id="scoreLabel">Score: 0</span>
          <span id="timeLabel">Temps: 60</span>
        </div>
      </div>

      <canvas id="gameCanvas" width="400" height="360"></canvas>

      <div class="menu-overlay" id="menuOverlay">
        <div class="menu-card">
          <h1>Super Chk Adventure</h1>
          <p>Choisis ta difficulté puis lance la partie</p>

          <div class="difficulty-buttons">
            <button id="easyBtn" class="menu-btn active" type="button">Facile</button>
            <button id="normalBtn" class="menu-btn" type="button">Normal</button>
          </div>

          <button id="startBtn" class="start-btn" type="button">Jouer</button>
        </div>
      </div>
    </section>

    <section class="controls-screen">
      <div class="controls-layout">
        <div class="move-controls">
          <button id="leftBtn" class="control-btn" type="button">◀</button>
          <button id="rightBtn" class="control-btn" type="button">▶</button>
        </div>

        <div class="action-controls">
          <button id="jumpBtn" class="control-btn jump-btn" type="button">SAUT</button>
          <button id="actionBtn" class="control-btn action-btn" type="button">ACTION</button>
        </div>
      </div>
    </section>
  </div>

  <script src="scripts/config.js?v=3"></script>
  <script src="scripts/state.js?v=3"></script>
  <script src="scripts/ui.js?v=3"></script>
  <script src="scripts/input.js?v=3"></script>
  <script src="scripts/player.js?v=3"></script>
  <script src="scripts/enemies.js?v=3"></script>
  <script src="scripts/levels.js?v=3"></script>
  <script src="scripts/backgrounds.js?v=3"></script>
  <script src="scripts/engine.js?v=3"></script>
  <script src="app.js?v=3"></script>
</body>
</html>
